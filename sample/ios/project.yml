name: DeviceGuardSample
options:
  bundleIdPrefix: io.github.dongnh311.deviceguard.sample
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  DeviceGuardSample:
    type: application
    platform: iOS
    sources:
      - path: DeviceGuardSample
    info:
      path: DeviceGuardSample/Info.plist
      properties:
        CFBundleDisplayName: DeviceGuard Sample
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CADisableMinimumFrameDurationOnPhone: true
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.dongnh311.deviceguard.sample.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        # The Kotlin `embedAndSignAppleFrameworkForXcode` pre-build script copies
        # SampleShared.framework here and signs / embeds it into the app bundle
        # itself, so no Xcode "Embed Frameworks" phase is needed — just tell the
        # linker where to find the module and its symbols.
        FRAMEWORK_SEARCH_PATHS:
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "SampleShared"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: "Build SampleShared framework via Gradle"
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/../.."
          ./gradlew :sample:shared:embedAndSignAppleFrameworkForXcode
