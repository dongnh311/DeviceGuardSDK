name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon
      - name: Run detekt
        run: ./gradlew detekt --no-daemon

  build-linux:
    name: Build (Linux — JVM + JS + Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build JVM / JS / Android targets
        run: |
          ./gradlew \
            compileKotlinJvm \
            compileKotlinJs \
            assembleRelease \
            jvmTest \
            jsNodeTest \
            --no-daemon
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-linux
          path: '**/build/reports/'

  build-macos:
    name: Build (macOS — iOS + full matrix)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Full build (all targets including iOS)
        run: ./gradlew build --no-daemon
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-macos
          path: '**/build/reports/'

  sample-android:
    name: Sample — Android APK
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble sample APK
        run: ./gradlew :sample:android:assembleDebug --no-daemon
      - name: Upload sample APK
        uses: actions/upload-artifact@v4
        with:
          name: sample-android-apk
          path: sample/android/build/outputs/apk/debug/*.apk

  sample-desktop:
    name: Sample — Desktop JAR
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build desktop distribution
        run: ./gradlew :sample:desktop:jar --no-daemon

  sample-web:
    name: Sample — Web bundle
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build production web bundle
        run: ./gradlew :sample:web:jsBrowserProductionWebpack --no-daemon
      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: sample-web-bundle
          path: sample/web/build/dist/js/productionExecutable/

  sample-ios-framework:
    name: Sample — iOS framework
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Link iOS simulator framework
        run: ./gradlew :sample:shared:linkReleaseFrameworkIosSimulatorArm64 --no-daemon

  docs:
    name: Dokka API docs
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Generate Dokka HTML
        run: ./gradlew dokkaHtmlMultiModule --no-daemon
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: build/dokka/htmlMultiModule
